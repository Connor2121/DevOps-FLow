<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Snowflake read flow using external stage with private endpoints</title>
<desc>Diagram showing Spark reading from Snowflake via a customer-owned external stage, with all traffic traversing private endpoints inside the customer network boundary</desc>
<defs>
<style>
  .t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 400; fill: #3d3d3a; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; fill: #73726c; }
  .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue text { fill: #0C447C; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #3C3489; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text { fill: #085041; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text { fill: #712B13; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber text { fill: #633806; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray text { fill: #444441; }
  .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Customer network boundary -->
<rect x="20" y="30" width="640" height="560" rx="20" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="6 4" opacity="0.6"/>
<text class="th" x="40" y="55" dominant-baseline="central" fill="#185FA5">Your cloud network boundary</text>
<text class="ts" x="40" y="73" dominant-baseline="central" fill="#185FA5">All traffic stays on private endpoints — no public internet</text>

<!-- Databricks cluster -->
<g class="c-blue">
<rect x="40" y="95" width="280" height="200" rx="14" stroke-width="0.5"/>
<text class="th" x="180" y="118" text-anchor="middle" dominant-baseline="central">Databricks cluster</text>
</g>

<g class="c-purple">
<rect x="60" y="140" width="240" height="58" rx="8" stroke-width="0.5"/>
<text class="th" x="180" y="160" text-anchor="middle" dominant-baseline="central">Spark driver</text>
<text class="ts" x="180" y="180" text-anchor="middle" dominant-baseline="central">Builds plan, opens JDBC</text>
</g>

<g class="c-teal">
<rect x="60" y="215" width="72" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="96" y="236" text-anchor="middle" dominant-baseline="central">Exec 1</text>
<text class="ts" x="96" y="254" text-anchor="middle" dominant-baseline="central">reads</text>
</g>
<g class="c-teal">
<rect x="144" y="215" width="72" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="180" y="236" text-anchor="middle" dominant-baseline="central">Exec 2</text>
<text class="ts" x="180" y="254" text-anchor="middle" dominant-baseline="central">reads</text>
</g>
<g class="c-teal">
<rect x="228" y="215" width="72" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="264" y="236" text-anchor="middle" dominant-baseline="central">Exec N</text>
<text class="ts" x="264" y="254" text-anchor="middle" dominant-baseline="central">reads</text>
</g>

<!-- Your storage account (external stage target) -->
<g class="c-amber">
<rect x="360" y="95" width="280" height="200" rx="14" stroke-width="0.5"/>
<text class="th" x="500" y="118" text-anchor="middle" dominant-baseline="central">Your storage account</text>
<text class="ts" x="500" y="136" text-anchor="middle" dominant-baseline="central">ADLS / S3 with private endpoint</text>
</g>

<g class="c-amber">
<rect x="380" y="160" width="240" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="500" y="175" text-anchor="middle" dominant-baseline="central">result_001.csv.gz</text>
</g>
<g class="c-amber">
<rect x="380" y="198" width="240" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="500" y="213" text-anchor="middle" dominant-baseline="central">result_002.csv.gz</text>
</g>
<g class="c-amber">
<rect x="380" y="236" width="240" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="500" y="251" text-anchor="middle" dominant-baseline="central">result_N.csv.gz</text>
</g>

<text class="ts" x="500" y="280" text-anchor="middle" dominant-baseline="central">container/databricks/unload/</text>

<!-- Snowflake (reached via private link) -->
<g class="c-coral">
<rect x="40" y="345" width="600" height="220" rx="14" stroke-width="0.5"/>
<text class="th" x="340" y="368" text-anchor="middle" dominant-baseline="central">Snowflake account</text>
<text class="ts" x="340" y="386" text-anchor="middle" dominant-baseline="central">Reached via private link to SQL endpoint</text>
</g>

<g class="c-coral">
<rect x="70" y="410" width="250" height="58" rx="8" stroke-width="0.5"/>
<text class="th" x="195" y="430" text-anchor="middle" dominant-baseline="central">Warehouse</text>
<text class="ts" x="195" y="450" text-anchor="middle" dominant-baseline="central">Runs pushed-down SQL</text>
</g>

<g class="c-coral">
<rect x="360" y="410" width="250" height="58" rx="8" stroke-width="0.5"/>
<text class="th" x="485" y="430" text-anchor="middle" dominant-baseline="central">Storage integration</text>
<text class="ts" x="485" y="450" text-anchor="middle" dominant-baseline="central">Managed identity writes out</text>
</g>

<g class="c-coral">
<rect x="70" y="485" width="540" height="58" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="505" text-anchor="middle" dominant-baseline="central">External stage object</text>
<text class="ts" x="340" y="525" text-anchor="middle" dominant-baseline="central">SHARED_UTILITIES.STAGES.DATABRICKS_UNLOAD_STAGE</text>
</g>

<!-- Arrow: Driver JDBC to Snowflake -->
<path d="M 180 198 L 180 320 L 195 320 L 195 408" class="arr" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
<text class="ts" x="100" y="308" text-anchor="middle" dominant-baseline="central">1. SQL via JDBC</text>
<text class="ts" x="100" y="325" text-anchor="middle" dominant-baseline="central">(private link)</text>

<!-- Arrow: Snowflake warehouse to stage object -->
<path d="M 195 470 L 195 485" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="240" y="478" text-anchor="start" dominant-baseline="central">2. COPY INTO stage</text>

<!-- Arrow: Stage integration writes files to your storage -->
<path d="M 485 408 L 485 320 L 500 320 L 500 290" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="560" y="310" text-anchor="middle" dominant-baseline="central">3. Files land in</text>
<text class="ts" x="560" y="327" text-anchor="middle" dominant-baseline="central">your storage</text>

<!-- Arrow: Executors read from your storage (parallel) -->
<path d="M 378 200 L 320 200 L 320 230 L 220 245" class="arr" marker-end="url(#arrow)"/>
<path d="M 378 213 L 300 213 L 300 245 L 184 245" class="arr" marker-end="url(#arrow)"/>
<path d="M 378 226 L 280 226 L 280 260 L 134 260" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="170" text-anchor="middle" dominant-baseline="central">4. Parallel read</text>
<text class="ts" x="340" y="186" text-anchor="middle" dominant-baseline="central">(private endpoint)</text>

<!-- Legend -->
<g class="c-gray">
<rect x="20" y="605" width="640" height="90" rx="8" stroke-width="0.5"/>
<text class="th" x="40" y="625" dominant-baseline="central">Flow summary</text>
<text class="ts" x="40" y="648" dominant-baseline="central">Step 1 — Driver sends rewritten SQL over private JDBC link to Snowflake.</text>
<text class="ts" x="40" y="666" dominant-baseline="central">Step 2 — Warehouse runs query, issues COPY INTO against named external stage.</text>
<text class="ts" x="40" y="684" dominant-baseline="central">Steps 3 &amp; 4 — Snowflake writes files to your storage; executors read via private endpoint.</text>
</g>
</svg>
