<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Snowflake read flow using default internal stage</title>
<desc>Diagram showing Spark reading from Snowflake via a Snowflake-managed internal user stage, with bulk data traversing Snowflake's cloud storage outside the customer network boundary</desc>
<defs>
<style>
  .t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 400; fill: #3d3d3a; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; fill: #73726c; }
  .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue text { fill: #0C447C; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #3C3489; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text { fill: #085041; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text { fill: #712B13; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray text { fill: #444441; }
  .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Customer network boundary -->
<rect x="20" y="30" width="320" height="300" rx="20" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="6 4" opacity="0.6"/>
<text class="th" x="40" y="55" dominant-baseline="central" fill="#185FA5">Your network boundary</text>

<!-- Snowflake boundary -->
<rect x="360" y="30" width="300" height="560" rx="20" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="6 4" opacity="0.6"/>
<text class="th" x="380" y="55" dominant-baseline="central" fill="#993C1D">Snowflake-managed infrastructure</text>

<!-- Databricks cluster -->
<g class="c-blue">
<rect x="40" y="85" width="280" height="220" rx="14" stroke-width="0.5"/>
<text class="th" x="180" y="108" text-anchor="middle" dominant-baseline="central">Databricks cluster</text>
</g>

<g class="c-purple">
<rect x="60" y="130" width="240" height="58" rx="8" stroke-width="0.5"/>
<text class="th" x="180" y="150" text-anchor="middle" dominant-baseline="central">Spark driver</text>
<text class="ts" x="180" y="170" text-anchor="middle" dominant-baseline="central">Builds plan, opens JDBC</text>
</g>

<g class="c-teal">
<rect x="60" y="205" width="72" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="96" y="225" text-anchor="middle" dominant-baseline="central">Exec 1</text>
<text class="ts" x="96" y="244" text-anchor="middle" dominant-baseline="central">reads with</text>
<text class="ts" x="96" y="261" text-anchor="middle" dominant-baseline="central">signed URL</text>
</g>
<g class="c-teal">
<rect x="144" y="205" width="72" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="180" y="225" text-anchor="middle" dominant-baseline="central">Exec 2</text>
<text class="ts" x="180" y="244" text-anchor="middle" dominant-baseline="central">reads with</text>
<text class="ts" x="180" y="261" text-anchor="middle" dominant-baseline="central">signed URL</text>
</g>
<g class="c-teal">
<rect x="228" y="205" width="72" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="264" y="225" text-anchor="middle" dominant-baseline="central">Exec N</text>
<text class="ts" x="264" y="244" text-anchor="middle" dominant-baseline="central">reads with</text>
<text class="ts" x="264" y="261" text-anchor="middle" dominant-baseline="central">signed URL</text>
</g>

<!-- Snowflake warehouse -->
<g class="c-coral">
<rect x="380" y="85" width="260" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="108" text-anchor="middle" dominant-baseline="central">Warehouse</text>
<text class="ts" x="510" y="128" text-anchor="middle" dominant-baseline="central">Runs pushed-down SQL,</text>
<text class="ts" x="510" y="144" text-anchor="middle" dominant-baseline="central">generates signed URLs</text>
</g>

<!-- Snowflake internal stage (user stage) -->
<g class="c-coral">
<rect x="380" y="180" width="260" height="290" rx="14" stroke-width="0.5"/>
<text class="th" x="510" y="205" text-anchor="middle" dominant-baseline="central">Internal user stage (@~)</text>
<text class="ts" x="510" y="223" text-anchor="middle" dominant-baseline="central">Snowflake-owned cloud storage</text>
<text class="ts" x="510" y="241" text-anchor="middle" dominant-baseline="central">Same region as your account</text>
</g>

<g class="c-coral">
<rect x="400" y="265" width="220" height="34" rx="6" stroke-width="0.5"/>
<text class="ts" x="510" y="283" text-anchor="middle" dominant-baseline="central">result_001.csv.gz</text>
</g>
<g class="c-coral">
<rect x="400" y="308" width="220" height="34" rx="6" stroke-width="0.5"/>
<text class="ts" x="510" y="326" text-anchor="middle" dominant-baseline="central">result_002.csv.gz</text>
</g>
<g class="c-coral">
<rect x="400" y="351" width="220" height="34" rx="6" stroke-width="0.5"/>
<text class="ts" x="510" y="369" text-anchor="middle" dominant-baseline="central">result_N.csv.gz</text>
</g>

<text class="ts" x="510" y="408" text-anchor="middle" dominant-baseline="central">@~/spark_connector_&lt;session&gt;/</text>
<text class="ts" x="510" y="426" text-anchor="middle" dominant-baseline="central">Auto-cleaned after session</text>
<text class="ts" x="510" y="444" text-anchor="middle" dominant-baseline="central">Invisible to your cloud console</text>

<!-- Snowflake SQL endpoint note -->
<g class="c-coral">
<rect x="380" y="490" width="260" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="512" text-anchor="middle" dominant-baseline="central">SQL endpoint</text>
<text class="ts" x="510" y="532" text-anchor="middle" dominant-baseline="central">account.snowflakecomputing.com</text>
<text class="ts" x="510" y="550" text-anchor="middle" dominant-baseline="central">TLS over public internet</text>
</g>

<!-- Arrow: Driver JDBC to Snowflake SQL endpoint -->
<path d="M 200 188 L 200 530 L 378 530" class="arr" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
<text class="ts" x="240" y="498" text-anchor="start" dominant-baseline="central">1. SQL via JDBC</text>
<text class="ts" x="240" y="515" text-anchor="start" dominant-baseline="central">(public TLS)</text>

<!-- Arrow: Warehouse to internal stage (internal to Snowflake) -->
<path d="M 510 155 L 510 178" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="570" y="166" text-anchor="start" dominant-baseline="central">2. Unload</text>

<!-- Arrow: Stage to executors (bulk read over public) -->
<path d="M 398 280 L 320 260" class="arr" marker-end="url(#arrow)"/>
<path d="M 398 322 L 320 255" class="arr" marker-end="url(#arrow)"/>
<path d="M 398 366 L 320 250" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="345" text-anchor="middle" dominant-baseline="central">3. Bulk read</text>
<text class="ts" x="355" y="362" text-anchor="middle" dominant-baseline="central">via signed URLs</text>
<text class="ts" x="355" y="379" text-anchor="middle" dominant-baseline="central">(public TLS)</text>

<!-- Legend -->
<g class="c-gray">
<rect x="20" y="605" width="640" height="120" rx="8" stroke-width="0.5"/>
<text class="th" x="40" y="625" dominant-baseline="central">Flow summary</text>
<text class="ts" x="40" y="648" dominant-baseline="central">Step 1 — Driver sends SQL over JDBC to Snowflake's public SQL endpoint.</text>
<text class="ts" x="40" y="666" dominant-baseline="central">Step 2 — Warehouse unloads result to internal user stage inside Snowflake's cloud.</text>
<text class="ts" x="40" y="684" dominant-baseline="central">Step 3 — Snowflake returns pre-signed URLs; executors fetch files directly from</text>
<text class="ts" x="40" y="702" dominant-baseline="central">Snowflake-owned storage over public TLS — this crosses your network boundary.</text>
</g>
</svg>
